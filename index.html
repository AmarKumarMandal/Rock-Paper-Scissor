<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>⚡ Rock · Paper · Scissors</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet"/>
  <style>
    /* ── Reset & Base ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-dark:       #0a0a14;
      --bg-card:       #12122a;
      --bg-card2:      #191932;
      --purple:        #8b5cf6;
      --cyan:          #22d3ee;
      --pink:          #f472b6;
      --green:         #34d399;
      --red:           #f87171;
      --yellow:        #fbbf24;
      --text-primary:  #f0f0ff;
      --text-secondary:#a0a0c8;
      --text-muted:    #64648c;
      --border-glow:   rgba(139,92,246,.35);
    }

    html, body {
      height: 100%; background: var(--bg-dark);
      font-family: 'Inter', sans-serif; color: var(--text-primary);
      overflow-x: hidden;
    }

    body {
      background: radial-gradient(ellipse at top, #0f0f23 0%, #0a0a14 70%);
      min-height: 100vh; display: flex; flex-direction: column;
    }

    /* ── Particle Canvas ──────────────────────────────────────────── */
    #particles { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

    /* ── Layout ───────────────────────────────────────────────────── */
    .wrapper {
      position: relative; z-index: 1;
      max-width: 860px; margin: 0 auto; width: 100%;
      display: flex; flex-direction: column; flex: 1;
      padding: 0 20px 24px;
    }

    /* ── Header ───────────────────────────────────────────────────── */
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 0 18px;
      border-bottom: 1px solid rgba(80,80,130,.4);
    }

    .header-title { text-align: center; flex: 1; }
    .header-title h1 {
      font-size: clamp(18px, 4vw, 26px); font-weight: 900;
      letter-spacing: .12em; color: var(--text-primary);
      text-transform: uppercase;
    }
    .header-title .sub {
      font-size: 11px; font-weight: 600; margin-top: 3px;
    }
    .sub span.p { color: var(--purple); }
    .sub span.c { color: var(--cyan); }
    .sub span.k { color: var(--pink); }

    #round-label {
      font-size: 12px; font-weight: 700; color: var(--text-muted);
      min-width: 80px; text-align: right;
    }
    #reset-btn {
      background: none; border: none; cursor: pointer;
      font: 700 12px 'Inter', sans-serif; color: var(--text-muted);
      transition: color .2s; min-width: 80px; padding: 6px 0;
    }
    #reset-btn:hover { color: var(--purple); }

    /* ── Scoreboard ───────────────────────────────────────────────── */
    .scoreboard {
      display: grid; grid-template-columns: 1fr 1fr 1fr;
      gap: 14px; margin: 22px 0 16px;
    }
    .score-card {
      background: var(--bg-card); border-radius: 16px;
      padding: 16px 12px; text-align: center;
      border: 1.5px solid transparent;
      transition: border-color .3s, box-shadow .3s;
    }
    .score-card:nth-child(1) { border-color: rgba(139,92,246,.3); }
    .score-card:nth-child(2) { border-color: rgba(251,191,36,.3); }
    .score-card:nth-child(3) { border-color: rgba(244,114,182,.3); }

    .score-label {
      font-size: 11px; font-weight: 700; letter-spacing: .1em;
      text-transform: uppercase;
    }
    .score-card:nth-child(1) .score-label { color: var(--purple); }
    .score-card:nth-child(2) .score-label { color: var(--yellow); }
    .score-card:nth-child(3) .score-label { color: var(--pink); }

    .score-value {
      font-size: 42px; font-weight: 900; line-height: 1.1; margin-top: 4px;
      transition: transform .2s;
    }
    .score-value.bump { animation: bump .25s ease; }
    @keyframes bump { 0%{transform:scale(1)} 50%{transform:scale(1.35)} 100%{transform:scale(1)} }

    /* ── Arena ────────────────────────────────────────────────────── */
    .arena {
      background: var(--bg-card2); border-radius: 20px;
      border: 1.5px solid var(--border-glow);
      padding: 10px 20px 18px; flex: 1;
      display: flex; flex-direction: column;
    }

    .choice-display {
      display: grid; grid-template-columns: 1fr auto 1fr;
      align-items: center; gap: 10px; padding: 10px 0 6px;
    }
    .player-side, .cpu-side {
      display: flex; flex-direction: column; align-items: center; gap: 6px;
    }
    .side-label {
      font-size: 11px; font-weight: 700; letter-spacing: .1em;
    }
    .player-side .side-label { color: var(--purple); }
    .cpu-side   .side-label { color: var(--pink); }

    .choice-emoji {
      font-size: clamp(44px, 8vw, 60px); line-height: 1;
      transition: transform .35s cubic-bezier(.34,1.56,.64,1);
      display: inline-block;
    }
    .choice-emoji.pop { animation: pop .4s cubic-bezier(.34,1.56,.64,1); }
    @keyframes pop { 0%{transform:scale(0) rotate(-15deg)} 70%{transform:scale(1.2) rotate(5deg)} 100%{transform:scale(1) rotate(0)} }

    .vs-label {
      font-size: 20px; font-weight: 900; color: rgba(120,120,180,.4);
      user-select: none;
    }

    /* ── Result Bar ───────────────────────────────────────────────── */
    .result-bar {
      text-align: center; min-height: 52px;
      display: flex; align-items: center; justify-content: center;
      margin-top: 4px;
    }
    #result-text {
      font-size: clamp(14px, 3.5vw, 18px); font-weight: 700;
      color: var(--text-secondary); transition: color .3s;
    }
    #result-text.flash { animation: flashAnim .6s steps(1, end); }
    @keyframes flashAnim {
      0%,20%,40%,60%,80%,100% { opacity:1 }
      10%,30%,50%,70%,90%     { opacity:0 }
    }

    /* ── Choice Buttons ───────────────────────────────────────────── */
    .btn-row {
      display: grid; grid-template-columns: 1fr 1fr 1fr;
      gap: 14px; margin-top: 16px;
    }

    .choice-btn {
      position: relative; background: var(--bg-card);
      border-radius: 18px; border: 1.5px solid rgba(255,255,255,.08);
      cursor: pointer; padding: 14px 8px 12px;
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      transition: transform .15s, border-color .25s, box-shadow .25s, background .25s;
      overflow: hidden; outline: none;
      -webkit-tap-highlight-color: transparent;
    }
    .choice-btn::before {
      content: ''; position: absolute; inset: -40%; border-radius: 50%;
      opacity: 0; transition: opacity .4s;
    }
    .choice-btn:hover::before { opacity: 1; }
    .choice-btn:hover { transform: translateY(-4px); }
    .choice-btn:active { transform: translateY(0) scale(.97); }
    .choice-btn:disabled { opacity: .4; cursor: not-allowed; transform: none !important; }

    /* Per-button accent */
    .choice-btn[data-choice="Rock"]     { --accent: #8b5cf6; }
    .choice-btn[data-choice="Paper"]    { --accent: #22d3ee; }
    .choice-btn[data-choice="Scissors"] { --accent: #f472b6; }

    .choice-btn::before {
      background: radial-gradient(circle, var(--accent) 0%, transparent 70%);
    }
    .choice-btn:hover {
      border-color: var(--accent);
      box-shadow: 0 0 24px rgba(var(--accent-rgb, 139,92,246), .35), 0 0 60px rgba(var(--accent-rgb, 139,92,246), .1);
    }

    /* Individual glow colors */
    .choice-btn[data-choice="Rock"]:hover     { box-shadow: 0 0 28px rgba(139,92,246,.5), 0 0 60px rgba(139,92,246,.15); }
    .choice-btn[data-choice="Paper"]:hover    { box-shadow: 0 0 28px rgba(34,211,238,.5), 0 0 60px rgba(34,211,238,.15); }
    .choice-btn[data-choice="Scissors"]:hover { box-shadow: 0 0 28px rgba(244,114,182,.5), 0 0 60px rgba(244,114,182,.15); }

    .btn-emoji { font-size: clamp(30px, 6vw, 38px); pointer-events: none; }
    .btn-label {
      font-size: 11px; font-weight: 700; letter-spacing: .12em;
      text-transform: uppercase; color: var(--accent); pointer-events: none;
    }

    /* ── History ──────────────────────────────────────────────────── */
    .history-section { margin-top: 18px; }
    .history-title {
      font-size: 11px; font-weight: 700; color: var(--text-muted);
      letter-spacing: .08em; text-transform: uppercase; margin-bottom: 8px;
    }
    #history-strip {
      display: flex; gap: 6px; flex-wrap: wrap; min-height: 26px;
    }
    .hist-badge {
      font-size: 11px; font-weight: 700; padding: 3px 10px;
      border-radius: 6px; border: 1px solid;
      animation: slideIn .25s ease;
    }
    @keyframes slideIn { from { opacity:0; transform:translateX(-8px) } to { opacity:1; transform:none } }
    .hist-badge.W { color: var(--green);  border-color: var(--green);  background: rgba(52,211,153,.12); }
    .hist-badge.L { color: var(--red);    border-color: var(--red);    background: rgba(248,113,113,.12); }
    .hist-badge.T { color: var(--yellow); border-color: var(--yellow); background: rgba(251,191,36,.12); }

    /* ── Pulse glow on buttons (JS-driven) ───────────────────────── */
    .pulse-glow { animation: pulseGlow 2s ease-in-out infinite; }
    @keyframes pulseGlow {
      0%,100% { box-shadow: 0 0 6px rgba(139,92,246,.2); }
      50%      { box-shadow: 0 0 20px rgba(139,92,246,.45); }
    }

    /* ── Responsive ───────────────────────────────────────────────── */
    @media (max-width: 480px) {
      .score-value { font-size: 32px; }
      .btn-row { gap: 10px; }
      .choice-btn { padding: 12px 6px 10px; }
    }
  </style>
</head>
<body>
<canvas id="particles"></canvas>

<div class="wrapper">
  <!-- Header -->
  <header>
    <button id="reset-btn" onclick="resetGame()">⟳ Reset</button>
    <div class="header-title">
      <h1>Rock · Paper · Scissors</h1>
      <p class="sub">
        <span class="p">Powered</span> <span class="c">by</span> <span class="k">JavaScript</span>
      </p>
    </div>
    <div id="round-label">Round 0</div>
  </header>

  <!-- Scoreboard -->
  <div class="scoreboard">
    <div class="score-card">
      <div class="score-label">You</div>
      <div class="score-value" id="score-player">0</div>
    </div>
    <div class="score-card">
      <div class="score-label">Ties</div>
      <div class="score-value" id="score-tie">0</div>
    </div>
    <div class="score-card">
      <div class="score-label">CPU</div>
      <div class="score-value" id="score-cpu">0</div>
    </div>
  </div>

  <!-- Arena -->
  <div class="arena">
    <div class="choice-display">
      <div class="player-side">
        <div class="side-label">YOU</div>
        <div class="choice-emoji" id="player-emoji">❓</div>
      </div>
      <div class="vs-label">VS</div>
      <div class="cpu-side">
        <div class="side-label">CPU</div>
        <div class="choice-emoji" id="cpu-emoji">❓</div>
      </div>
    </div>
    <div class="result-bar">
      <div id="result-text">Choose your weapon!</div>
    </div>
  </div>

  <!-- Choice Buttons -->
  <div class="btn-row" id="btn-row">
    <button class="choice-btn" data-choice="Rock"     onclick="play('Rock')"    >
      <span class="btn-emoji">🪨</span>
      <span class="btn-label">Rock</span>
    </button>
    <button class="choice-btn" data-choice="Paper"    onclick="play('Paper')"   >
      <span class="btn-emoji">📄</span>
      <span class="btn-label">Paper</span>
    </button>
    <button class="choice-btn" data-choice="Scissors" onclick="play('Scissors')">
      <span class="btn-emoji">✂️</span>
      <span class="btn-label">Scissors</span>
    </button>
  </div>

  <!-- History -->
  <div class="history-section">
    <div class="history-title">Recent History</div>
    <div id="history-strip"></div>
  </div>
</div>

<script>
// ── Game State ──────────────────────────────────────────────────────────────
const CHOICES = ['Rock', 'Paper', 'Scissors'];
const EMOJI   = { Rock: '🪨', Paper: '📄', Scissors: '✂️' };
let pScore = 0, cScore = 0, tScore = 0, round = 0;
let busy = false;
let history = [];

// ── DOM refs ────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const playerEmoji  = $('player-emoji');
const cpuEmoji     = $('cpu-emoji');
const resultText   = $('result-text');
const roundLabel   = $('round-label');
const scorePlayer  = $('score-player');
const scoreTie     = $('score-tie');
const scoreCpu     = $('score-cpu');
const historyStrip = $('history-strip');
const btnRow       = $('btn-row');

// ── Game Logic ───────────────────────────────────────────────────────────────
function play(choice) {
  if (busy) return;
  busy = true;
  setButtons(false);

  const cpu = CHOICES[Math.floor(Math.random() * 3)];
  round++;
  roundLabel.textContent = `Round ${round}`;

  // Show player immediately, stall CPU
  playerEmoji.textContent = EMOJI[choice];
  playerEmoji.classList.remove('pop'); void playerEmoji.offsetWidth; playerEmoji.classList.add('pop');
  cpuEmoji.textContent = '⏳';
  resultText.textContent = 'CPU is thinking…';
  resultText.style.color = 'var(--text-secondary)';

  setTimeout(() => {
    const result = winner(choice, cpu);
    cpuEmoji.textContent = EMOJI[cpu];
    cpuEmoji.classList.remove('pop'); void cpuEmoji.offsetWidth; cpuEmoji.classList.add('pop');

    let msg, color;
    if (result === 'WIN')  { pScore++; msg = '🏆 You Win! 🏆';     color = 'var(--green)';  }
    if (result === 'LOSE') { cScore++; msg = '💀 You Lose! 💀';    color = 'var(--red)';    }
    if (result === 'TIE')  { tScore++; msg = '🤝 It\'s a Tie! 🤝'; color = 'var(--yellow)'; }

    msg += `  (${choice} vs ${cpu})`;
    resultText.textContent = msg;
    resultText.style.color = color;
    resultText.classList.remove('flash'); void resultText.offsetWidth; resultText.classList.add('flash');

    updateScores(result);
    addHistory(result);
    busy = false;
    setButtons(true);
  }, 750);
}

function winner(p, c) {
  if (p === c) return 'TIE';
  if ((p==='Rock'&&c==='Scissors')||(p==='Paper'&&c==='Rock')||(p==='Scissors'&&c==='Paper')) return 'WIN';
  return 'LOSE';
}

function updateScores(result) {
  scorePlayer.textContent = pScore;
  scoreTie.textContent    = tScore;
  scoreCpu.textContent    = cScore;

  const el = result==='WIN' ? scorePlayer : result==='LOSE' ? scoreCpu : scoreTie;
  el.classList.remove('bump'); void el.offsetWidth; el.classList.add('bump');
}

function addHistory(result) {
  if (history.length >= 10) {
    history.shift();
    historyStrip.removeChild(historyStrip.firstChild);
  }
  history.push(result);
  const sym = result === 'WIN' ? 'W' : result === 'LOSE' ? 'L' : 'T';
  const badge = document.createElement('div');
  badge.className = `hist-badge ${sym}`;
  badge.textContent = sym;
  historyStrip.appendChild(badge);
}

function setButtons(enabled) {
  btnRow.querySelectorAll('.choice-btn').forEach(b => b.disabled = !enabled);
}

function resetGame() {
  pScore = cScore = tScore = round = 0;
  history = [];
  busy = false;
  playerEmoji.textContent  = '❓';
  cpuEmoji.textContent     = '❓';
  resultText.textContent   = 'Choose your weapon!';
  resultText.style.color   = 'var(--text-secondary)';
  roundLabel.textContent   = 'Round 0';
  scorePlayer.textContent  = scoreTie.textContent = scoreCpu.textContent = '0';
  historyStrip.innerHTML   = '';
  setButtons(true);
}

// ── Particle Background ──────────────────────────────────────────────────────
(function() {
  const canvas = $('particles');
  const ctx = canvas.getContext('2d');
  let W, H, particles = [];

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const COLORS = ['#8b5cf6','#22d3ee','#f472b6'];

  class Particle {
    constructor() { this.reset(true); }
    reset(initial) {
      this.x = Math.random() * W;
      this.y = initial ? Math.random() * H : H + 10;
      this.r = Math.random() * 1.8 + .4;
      this.vy = -(Math.random() * .4 + .1);
      this.vx = (Math.random() - .5) * .2;
      this.alpha = 0;
      this.maxAlpha = Math.random() * .5 + .15;
      this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
      this.fade = Math.random() > .5 ? 'in' : 'out';
      if (initial) { this.alpha = Math.random() * this.maxAlpha; this.fade = 'out'; }
    }
    update() {
      this.x += this.vx; this.y += this.vy;
      if (this.fade === 'in') {
        this.alpha += .005;
        if (this.alpha >= this.maxAlpha) this.fade = 'out';
      } else {
        this.alpha -= .003;
        if (this.alpha <= 0) this.reset(false);
      }
    }
    draw() {
      ctx.save(); ctx.globalAlpha = Math.max(0, this.alpha);
      ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI*2);
      ctx.fillStyle = this.color; ctx.fill(); ctx.restore();
    }
  }

  for (let i = 0; i < 90; i++) particles.push(new Particle());

  function loop() {
    ctx.clearRect(0, 0, W, H);
    particles.forEach(p => { p.update(); p.draw(); });
    requestAnimationFrame(loop);
  }
  loop();
})();
</script>
</body>
</html>
